<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Twoplay — 2-Player Game Arcade</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header class="site-header">
    <a class="brand" href="/">▶▶ Twoplay</a>
  </header>

  <main class="app">
    <section class="home-hero">
      <h1 class="home-title">Pick a game</h1>
      <p class="muted">Two players, one room code. Choose a game and invite a friend.</p>
    </section>

    <div class="game-grid">
      <article class="game-card">
        <div class="game-card-icon">🐂</div>
        <h2>Cows &amp; Bulls</h2>
        <p class="muted">Crack your opponent's secret number before they crack yours.</p>
        <a class="primary card-play" href="/cows-and-bulls.html">Play</a>
      </article>

      <article class="game-card">
        <div class="game-card-icon">🚢</div>
        <h2>Battleship</h2>
        <p class="muted">Hide your fleet, then sink your opponent's ship by ship.</p>
        <a class="primary card-play" href="/battleship.html">Play</a>
      </article>
    </div>
  </main>
</body>
</html>
